# /etc/nginx/sites-available/wanderly
#
# Nginx configuration for the Wanderly Django application.
#
# Installation:
#   sudo ln -s /etc/nginx/sites-available/wanderly /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Requirements:
#   - Gunicorn listening on a Unix socket at /run/gunicorn/wanderly.sock
#   - Certbot / Let's Encrypt certificate at the paths below
#   - Static files collected to /srv/wanderly/staticfiles/
#   - Private media at /srv/wanderly/private_media/

# ─────────────────────────────────────────────────────────────
# 1. HTTP → HTTPS redirect
#    All plain-text HTTP requests are permanently redirected to HTTPS.
#    This alone is not sufficient; also set SECURE_SSL_REDIRECT=True
#    in Django settings so Django itself enforces the redirect.
# ─────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name wanderly.com www.wanderly.com;

    # Redirect all HTTP traffic to HTTPS with a permanent (301) redirect.
    return 301 https://$host$request_uri;
}

# ─────────────────────────────────────────────────────────────
# 2. HTTPS main server block
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wanderly.com www.wanderly.com;

    # ── SSL Certificate (Let's Encrypt via certbot) ──────────
    ssl_certificate     /etc/letsencrypt/live/wanderly.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wanderly.com/privkey.pem;

    # Strong TLS configuration: only modern protocols and cipher suites.
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  8.8.8.8 8.8.4.4 valid=300s;

    # ── Upload size limit ─────────────────────────────────────
    # Limits the size of the client request body.  Prevents partners from
    # uploading arbitrarily large files that would consume disk space or
    # cause memory exhaustion in Gunicorn workers.
    client_max_body_size 10M;

    # ── Security Headers ──────────────────────────────────────
    # These instruct browsers to apply additional protections.

    # Prevents browsers from MIME-type sniffing (e.g. serving a .jpg as JS).
    add_header X-Content-Type-Options    "nosniff"                     always;

    # Enables the browser's built-in XSS auditor (legacy browsers).
    add_header X-XSS-Protection          "1; mode=block"               always;

    # Disallows embedding the site in an iframe (clickjacking mitigation).
    add_header X-Frame-Options           "DENY"                        always;

    # Informs the browser what resources are allowed to load.
    # Adjust the CSP below to match the CDNs / external scripts you actually use.
    # 'unsafe-inline' for style-src is a common compromise for legacy CSS;
    # try to eliminate it by moving inline styles to external stylesheets.
    add_header Content-Security-Policy
        "default-src 'self'; "
        "script-src  'self' https://cdnjs.cloudflare.com; "
        "style-src   'self' 'unsafe-inline' https://fonts.googleapis.com; "
        "font-src    'self' https://fonts.gstatic.com; "
        "img-src     'self' data:; "
        "connect-src 'self' wss://wanderly.com; "
        "frame-ancestors 'none';"
        always;

    # HTTP Strict Transport Security: browsers must use HTTPS for 1 year.
    # Only add 'preload' and submit to the HSTS preload list once you're certain.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Controls how much referrer info is sent with requests.
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Permissions Policy: disable browser features you don't use.
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ── Static files (served directly by Nginx, no Django) ───
    location /static/ {
        alias /srv/wanderly/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Public media (profile photos, city images, post images).
    location /media/ {
        alias /srv/wanderly/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Private media (X-Accel-Redirect target) ──────────────
    # This location is INTERNAL — direct browser requests to /private_docs/
    # return 404.  Only Django can trigger the redirect via the
    # X-Accel-Redirect response header (see partners/views.py).
    location /private_docs/ {
        internal;
        alias /srv/wanderly/private_media/;
    }

    # ── WebSocket support (Django Channels) ──────────────────
    location /ws/ {
        proxy_pass          http://unix:/run/gunicorn/wanderly.sock;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_read_timeout  86400;  # 24 hours for long-lived WS connections
    }

    # ── Django application (everything else) ─────────────────
    location / {
        proxy_pass          http://unix:/run/gunicorn/wanderly.sock;
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Tell Django it's behind HTTPS so it generates https:// URLs.
        proxy_set_header    X-Forwarded-Proto https;
        proxy_redirect      off;
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ── Logging ───────────────────────────────────────────────
    access_log /var/log/nginx/wanderly_access.log;
    error_log  /var/log/nginx/wanderly_error.log  warn;
}
